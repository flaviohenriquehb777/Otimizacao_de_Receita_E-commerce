name: commit-date-guard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  guard-commit-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate snapshot history dates (Jan–Jun 2022)
        shell: bash
        run: |
          set -euo pipefail
          START="2022-01-01T00:00:00Z"
          END="2022-06-30T23:59:59Z"

          if ! git show-ref --tags --verify --quiet "refs/tags/snapshot"; then
            echo "Tag 'snapshot' não encontrada. Ignorando validação de datas."
            exit 0
          fi

          SNAPSHOT_REF="$(git rev-parse "refs/tags/snapshot")"
          COMMITS="$(git rev-list "${SNAPSHOT_REF}")"

          start_s=$(date -d "$START" +%s)
          end_s=$(date -d "$END" +%s)

          echo "Checking commit date policy: $START .. $END"
          for c in ${COMMITS}; do
            a_date=$(git show -s --format=%aI "$c")
            c_date=$(git show -s --format=%cI "$c")
            a_s=$(date -d "$a_date" +%s)
            c_s=$(date -d "$c_date" +%s)

            if [[ $a_s -lt $start_s || $a_s -gt $end_s ]]; then
              echo "ERROR: Commit $c author date $a_date outside allowed range"
              exit 1
            fi
            if [[ $c_s -lt $start_s || $c_s -gt $end_s ]]; then
              echo "ERROR: Commit $c committer date $c_date outside allowed range"
              exit 1
            fi
            echo "OK: $c -> author=$a_date committer=$c_date"
          done

          echo "All commit dates comply with the Jan–Jun 2022 policy."
